<body>
  <h1>Leccion 12 - Funciones Avanzadas</h1>




    <!--Carga de JavaScript Interno-->
    <script>

      function nuevo(){
        console.log("Hola");
      }

      nuevo();

      const num1 = 20;

      const funcion1 = function(){  //funcion anonima
        console.log("Hola 2");

      }; //se le coloca punto y coma al final porque se esta guardando dentro de una variable

      console.log(funcion1);
      /* En consola muestra la funcion de la variable
      ƒ funVar(){
        console.log("Hola 2");

      }
      */

      console.log(typeof funcion1); //muestra que es una funcion 

      //tambien podemos llamar a la funcion que esta siendo guardad dentro de una variable de esta forma
      funcion1(); // llama a la funcion tambien
      
      const objeto1 = {
        num: 1,
        fun: function(){
          console.log("Hola 3");
        }
      };

      //accedemos a la funcion del objeto con el metodo de puntos
      objeto1.fun(); //muestra el msj que esta en la funcion con el llamado



      function display(param){
          console.log(param);
      }

      display("Hola 4"); //entra en la funcion  y muestra el parametro ingresado en este caso "Hola 4"


    </script>
