    <!--Carga de JavaScript Interno-->
    <script>
      /*

      */

      //12c
      const dato = document.querySelector('.js-btn');
      dato.addEventListener("click", () => {
        interruptor();
      });


      function interruptor() {
          setTimeout(() => {
            dato.innerHTML = 'Terminado';     
          }, 1000);

      }

      //12i
      const btnAdd = document.querySelector(".js-btn-add");
      const btnRemove = document.querySelector(".js-btn-remove");
      let messages = 2;
      let intervalId; // Guardamos el ID del intervalo por si necesitamos cancelarlo.
      let isDisplayingNotification; // Usaremos esta variable para llevar el control de si estamos mostrando la notificación o no.

      // Empezar a mostrar la notificación en la pestaña cuando la página se cargue por primera vez.
      displayNotification();

      //Boton Agregar
      btnAdd.addEventListener("click", () => {
        messages++;
        displayNotification();
      });

      //Boton Eliminar
      btnRemove.addEventListener("click", () => {
            if (messages > 0) {
              messages--;
              if (messages === 0) {
                stopNotification();
              }
            }
      });

      function displayNotification() {
          // Si ya estamos mostrando la notificación, detener esta función porque no queremos y crear 2 intervalos al mismo tiempo.
          if (isDisplayingNotification) {
            return;
          }

          isDisplayingNotification = true;

          intervalId = setInterval(() => {
            if (document.title === 'App') {
              document.title = `(${messages}) New messages`;
            } else {
              document.title = 'App';
            }
          }, 1000);
      }

      function stopNotification() {
        isDisplayingNotification = false;

        clearInterval(intervalId);
        document.title = 'App';
      }
