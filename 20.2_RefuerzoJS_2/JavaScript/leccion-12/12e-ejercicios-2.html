      /*
        120. Actualiza el ejercicio 12n para eliminar solo los 2 primeros huevos del array.
        De nuevo, usa .filter() en lugar de un bucle
        - removeEgg(['huevo', 'manzana', 'huevo', 'huevo', 'jamón']) => ['manzana', 'huevo', 'jamón']


      */

      function removeEgg(foods) {

        return foods.filter(value => value !== 'egg' );

      }

      console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham'])); //en consola ['apple', 'ham']
