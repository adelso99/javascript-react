  <h1>Leccion 12 Parte 2 - Ejercicios</h1>

  <button class="js-btn" onclick="
  interruptor();
  ">Inicio</button>

  <button onclick="
    messages++;
    displayNotification();
  ">Add</button>

  <button onclick="
    if (messages > 0) {
      messages--;

      // Si no hay mensajes nuevos, dejar de mostrar
      // la notificación en la pestaña.
      if (messages === 0) {
        stopNotification();
      }
    }
  ">Remove</button>



    <!--Carga de JavaScript Interno-->
    <script>
      /*
      12p. Regresa a los ejercicios anteriores de la lección 12 (12c - 12i) y cambia el código para usar funciones de flecha. (Al pasar una función a otra, usa funciones de flecha. De lo contrario, puedes usar cualquiera de las dos sintaxis).

      12q. Regresa a los ejercicios anteriores de la lección 12 (12c - 12i) y, en lugar de usar onclick="...", cambia el código para usar .addEventListener('click', ...)


      */

      function interruptor(){
        const dato = document.querySelector('.js-btn')

          setTimeout(function() {
            dato.innerHTML = 'Terminado';     
          }, 1000);

      }

      let messages = 2;

      // Guardamos el ID del intervalo por si necesitamos cancelarlo.
      let intervalId;

      // Usaremos esta variable para llevar el control
      // de si estamos mostrando la notificación o no.
      let isDisplayingNotification;

      // Empezar a mostrar la notificación en la pestaña
      // cuando la página se cargue por primera vez.
      displayNotification();

      function displayNotification() {
        // Si ya estamos mostrando la notificación,
        // detener esta función porque no queremos
        // crear 2 intervalos al mismo tiempo.
        if (isDisplayingNotification) {
          return;
        }

        isDisplayingNotification = true;

        intervalId = setInterval(function() {
          if (document.title === 'App') {
            document.title = `(${messages}) New messages`;
          } else {
            document.title = 'App';
          }
        }, 1000);
      }

      function stopNotification() {
        isDisplayingNotification = false;

        clearInterval(intervalId);
        document.title = 'App';
      }
